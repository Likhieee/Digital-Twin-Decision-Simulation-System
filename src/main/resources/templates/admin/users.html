<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users – Admin – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-people" style="color:var(--accent)"></i> Manage Users</h1>
      <p class="page-subtitle">View and manage all registered users</p>
    </div>
    <div style="display:flex;gap:8px">
      <a th:href="@{/admin}" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Admin Home</a>
      <button class="btn btn-success" data-modal="createUserModal"><i class="bi bi-person-plus"></i> Create User</button>
    </div>
  </div>

  <div th:if="${successMsg}" class="alert alert-success"><i class="bi bi-check-circle"></i><span th:text="${successMsg}"></span><button class="alert-close">×</button></div>
  <div th:if="${errorMsg}"   class="alert alert-danger"><i class="bi bi-x-circle"></i><span th:text="${errorMsg}"></span><button class="alert-close">×</button></div>

  <div class="glass-card animate-fade-up" style="overflow:hidden">
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td style="color:var(--text-dim);font-size:12px" th:text="${u.id}"></td>
            <td style="font-weight:600" th:text="${u.username}"></td>
            <td style="color:var(--text-muted);font-size:12.5px" th:text="${u.email}"></td>
            <td><span th:class="${u.role.name() == 'ADMIN'} ? 'badge badge-admin' : 'badge badge-user'" th:text="${u.role}"></span></td>
            <td><span th:class="${u.enabled} ? 'badge badge-active' : 'badge badge-danger'" th:text="${u.enabled} ? 'Active' : 'Disabled'"></span></td>
            <td style="color:var(--text-muted);font-size:12.5px" th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
            <td>
              <div style="display:flex;gap:6px">
                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-sm"
                          th:class="${u.enabled} ? 'btn btn-sm btn-warn' : 'btn btn-sm btn-success'"
                          th:text="${u.enabled} ? 'Disable' : 'Enable'"></button>
                </form>
                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger-ghost btn-icon btn-sm" onclick="return confirm('Permanently delete this user and all their data?')"><i class="bi bi-trash"></i></button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="createUserModal">
  <div class="modal-box">
    <div class="modal-header"><h4>Create New User</h4><button class="modal-close">×</button></div>
    <form th:action="@{/admin/users/create}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" required/></div>
        <div class="form-group"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required/></div>
        <div class="form-group"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" minlength="6" required/></div>
        <div class="form-group"><label class="form-label">Role</label>
          <select name="role" class="form-control form-select">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-ghost" data-modal-close>Cancel</button><button type="submit" class="btn btn-success">Create User</button></div>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
