<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Simulation – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper-narrow">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
    <a th:href="@{/scenarios/{id}(id=${scenario.id})}" class="btn btn-ghost btn-icon"><i class="bi bi-arrow-left"></i></a>
    <div>
      <h1 class="page-title" style="font-size:1.4rem"><i class="bi bi-lightning-charge" style="color:var(--accent-3)"></i> Run Simulation</h1>
      <p class="page-subtitle">Review and launch your decision analysis</p>
    </div>
  </div>

  <div th:if="${errorMsg}"      class="alert alert-danger"><i class="bi bi-x-circle"></i><span th:text="${errorMsg}"></span><button class="alert-close">×</button></div>
  <div th:if="${weightWarning}" class="alert alert-warning"><i class="bi bi-exclamation-triangle"></i><span th:text="${weightWarning}"></span><button class="alert-close">×</button></div>
  <div th:unless="${canSimulate}" class="alert alert-danger"><i class="bi bi-x-circle"></i> This scenario is not ready. Ensure it has at least <strong>2 options</strong> and <strong>1 priority</strong>.</div>

  <!-- Scenario Summary -->
  <div class="glass-card animate-fade-up mb-4" style="padding:24px">
    <h3 style="font-size:1.15rem;margin-bottom:6px" th:text="${scenario.title}"></h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px" th:text="${scenario.description}"></p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      <div class="glass-card" style="padding:14px;text-align:center;border-radius:10px">
        <div style="font-size:1.8rem;font-weight:800;color:var(--accent)" th:text="${#lists.size(scenario.options)}"></div>
        <div style="font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Options</div>
      </div>
      <div class="glass-card" style="padding:14px;text-align:center;border-radius:10px">
        <div style="font-size:1.8rem;font-weight:800;color:var(--accent-warn)" th:text="${#lists.size(scenario.priorities)}"></div>
        <div style="font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Priorities</div>
      </div>
      <div class="glass-card" style="padding:14px;text-align:center;border-radius:10px">
        <div style="font-size:1rem;font-weight:700;color:var(--accent-2)" th:text="${scenario.category}"></div>
        <div style="font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Category</div>
      </div>
    </div>
  </div>

  <!-- Options preview -->
  <div class="glass-card animate-fade-up mb-4" style="padding:0;overflow:hidden;animation-delay:.08s">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px">
      <i class="bi bi-list-check" style="color:var(--accent)"></i> Options to Compare
    </div>
    <div style="padding:16px 20px">
      <div th:each="opt : ${scenario.options}" style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div style="font-weight:600;font-size:13.5px;margin-bottom:6px" th:text="${opt.name}"></div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          <span th:each="attr : ${opt.attributes}" class="tag-pill">
            <span th:text="${attr.name}"></span>: <strong th:text="${attr.value}"></strong>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Priorities preview -->
  <div class="glass-card animate-fade-up mb-4" style="padding:0;overflow:hidden;animation-delay:.12s">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px">
      <i class="bi bi-sliders" style="color:var(--accent-warn)"></i> Priority Weights
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:rgba(255,255,255,0.02)">
          <th style="padding:10px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border)">Criterion</th>
          <th style="padding:10px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border)">Weight</th>
          <th style="padding:10px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border)">Direction</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${scenario.priorities}" style="border-bottom:1px solid rgba(255,255,255,0.04)">
          <td style="padding:10px 20px;font-size:13px" th:text="${p.label}"></td>
          <td style="padding:10px 20px;font-size:13px;font-weight:700" th:text="${p.weight}"></td>
          <td style="padding:10px 20px;font-size:12.5px"
              th:text="${p.higherIsBetter} ? '↑ Higher is better' : '↓ Lower is better'"
              th:style="${p.higherIsBetter} ? 'color:var(--accent-3)' : 'color:var(--accent-danger)'"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Run form -->
  <div class="glass-card animate-fade-up" style="padding:24px;animation-delay:.16s">
    <form th:action="@{/simulations/run/{id}(id=${scenario.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">Notes <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Any notes about this simulation run…"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <a th:href="@{/scenarios/{id}(id=${scenario.id})}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-success animate-glow" th:disabled="${!canSimulate}" style="padding:10px 28px">
          <i class="bi bi-lightning-charge"></i> Run Simulation Now
        </button>
      </div>
    </form>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
