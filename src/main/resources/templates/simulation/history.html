<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulation History – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-clock-history" style="color:var(--accent)"></i> Simulation History</h1>
      <p class="page-subtitle" th:if="${scenario != null}" th:text="'Showing history for: ' + ${scenario.title}"></p>
      <p class="page-subtitle" th:unless="${scenario != null}">All your simulation runs</p>
    </div>
    <a th:href="@{/scenarios}" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back to Scenarios</a>
  </div>

  <div th:if="${successMsg}" class="alert alert-success"><i class="bi bi-check-circle"></i><span th:text="${successMsg}"></span><button class="alert-close">×</button></div>

  <div th:if="${#lists.isEmpty(history)}" class="glass-card empty-state" style="padding:64px 24px">
    <div class="empty-icon">🕐</div>
    <h5>No simulations yet</h5>
    <p>Run your first simulation to see results here.</p>
    <a th:href="@{/scenarios}" class="btn btn-primary mt-4"><i class="bi bi-diagram-3"></i> Go to Scenarios</a>
  </div>

  <div class="glass-card animate-fade-up" style="overflow:hidden" th:unless="${#lists.isEmpty(history)}">
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Scenario</th>
            <th>Category</th>
            <th>Run At</th>
            <th>Top Pick</th>
            <th>Score</th>
            <th>Options</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="run, stat : ${history}" th:attr="data-href=@{/simulations/results/{id}(id=${run.id})}">
            <td style="color:var(--text-dim);font-size:12px" th:text="${stat.count}"></td>
            <td>
              <a th:href="@{/scenarios/{id}(id=${run.scenario.id})}" style="font-weight:600" th:text="${run.scenario.title}"></a>
            </td>
            <td><span class="badge badge-cat" th:text="${run.scenario.category}"></span></td>
            <td style="color:var(--text-muted);font-size:12.5px" th:text="${#temporals.format(run.runAt,'dd MMM yyyy, HH:mm')}"></td>
            <td>
              <span th:if="${run.topResult != null}" class="badge badge-success" th:text="${run.topResult.option.name}"></span>
              <span th:unless="${run.topResult != null}" style="color:var(--text-dim);font-size:12px">N/A</span>
            </td>
            <td>
              <span th:if="${run.topResult != null}" style="font-weight:700;color:var(--accent-3)" th:text="${run.topResult.scoreFormatted} + '/100'"></span>
            </td>
            <td style="text-align:center"><span class="badge badge-info" th:text="${#lists.size(run.results)}"></span></td>
            <td>
              <div style="display:flex;gap:6px">
                <a th:href="@{/simulations/results/{id}(id=${run.id})}" class="btn btn-primary btn-icon btn-sm" title="View Results"><i class="bi bi-eye"></i></a>
                <a th:href="@{/reports/{id}(id=${run.id})}"             class="btn btn-ghost btn-icon btn-sm"   title="Report"><i class="bi bi-file-earmark-bar-graph"></i></a>
                <form th:action="@{/simulations/delete/{id}(id=${run.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-danger-ghost btn-icon btn-sm" type="submit" onclick="return confirm('Delete this simulation run?')" title="Delete"><i class="bi bi-trash"></i></button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
