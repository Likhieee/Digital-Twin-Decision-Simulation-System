<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-bar-chart-line" style="color:var(--accent-2)"></i> All Reports</h1>
      <p class="page-subtitle">Full decision analysis reports from your simulations</p>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(summaries)}" class="glass-card empty-state" style="padding:64px 24px">
    <div class="empty-icon">📊</div>
    <h5>No reports yet</h5>
    <p>Run simulations to generate detailed reports.</p>
    <a th:href="@{/scenarios}" class="btn btn-primary mt-4"><i class="bi bi-diagram-3"></i> Go to Scenarios</a>
  </div>

  <div class="glass-card animate-fade-up" style="overflow:hidden" th:unless="${#lists.isEmpty(summaries)}">
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Scenario</th>
            <th>Category</th>
            <th>Date</th>
            <th>Recommendation</th>
            <th>Top Score</th>
            <th>Options</th>
            <th>Report</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="s, stat : ${summaries}" th:attr="data-href=@{/reports/{id}(id=${s.runId})}">
            <td style="color:var(--text-dim);font-size:12px" th:text="${stat.count}"></td>
            <td style="font-weight:600" th:text="${s.scenarioTitle}"></td>
            <td><span class="badge badge-cat" th:text="${s.category}"></span></td>
            <td style="color:var(--text-muted);font-size:12.5px" th:text="${#temporals.format(s.runAt,'dd MMM yyyy, HH:mm')}"></td>
            <td><span class="badge badge-success" th:text="${s.recommendation}"></span></td>
            <td style="font-weight:700;color:var(--accent-3)" th:text="${#numbers.formatDecimal(s.topScore,1,1)} + '/100'"></td>
            <td style="text-align:center"><span class="badge badge-info" th:text="${s.optionCount}"></span></td>
            <td>
              <a th:href="@{/reports/{id}(id=${s.runId})}" class="btn btn-primary btn-sm">
                <i class="bi bi-file-earmark-bar-graph"></i> View
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
