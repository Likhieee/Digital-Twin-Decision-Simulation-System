<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="app-navbar">
  <a th:href="@{/dashboard}" class="brand">
    <div class="brand-icon">⚡</div>
    DecisionSim
  </a>
  <ul class="nav-links">
    <li><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i> Dashboard</a></li>
    <li><a th:href="@{/scenarios}"><i class="bi bi-diagram-3"></i> Scenarios</a></li>
    <li><a th:href="@{/simulations/history}"><i class="bi bi-clock-history"></i> History</a></li>
    <li><a th:href="@{/reports/history}"><i class="bi bi-bar-chart-line"></i> Reports</a></li>
    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}" class="admin-link"><i class="bi bi-shield-lock"></i> Admin</a></li>
  </ul>
  <div class="nav-right">
    <div class="user-chip" tabindex="0">
      <div class="user-avatar" sec:authentication="name">U</div>
      <span class="username" sec:authentication="name">User</span>
      <i class="bi bi-chevron-down" style="font-size:10px;color:var(--text-dim);margin-left:2px;"></i>
      <div class="nav-dropdown">
        <a th:href="@{/auth/logout}" class="danger"><i class="bi bi-box-arrow-right"></i> Sign Out</a>
      </div>
    </div>
  </div>
</nav>
</body>
</html>
