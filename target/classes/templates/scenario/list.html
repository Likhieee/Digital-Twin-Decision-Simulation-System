<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scenarios – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-diagram-3" style="color:var(--accent)"></i> My Scenarios</h1>
      <p class="page-subtitle">Manage and simulate your decision scenarios</p>
    </div>
    <a th:href="@{/scenarios/create}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> New Scenario</a>
  </div>

  <div th:if="${successMsg}" class="alert alert-success"><i class="bi bi-check-circle"></i><span th:text="${successMsg}"></span><button class="alert-close">×</button></div>
  <div th:if="${errorMsg}"   class="alert alert-danger"><i class="bi bi-x-circle"></i><span th:text="${errorMsg}"></span><button class="alert-close">×</button></div>

  <!-- Filters -->
  <div class="glass-card mb-4" style="padding:16px 20px">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <form th:action="@{/scenarios}" method="get" style="flex:1;min-width:200px">
        <div class="input-with-icon">
          <i class="bi bi-search input-icon"></i>
          <input type="text" name="q" class="form-control" placeholder="Search scenarios…" th:value="${query}" style="padding-left:40px"/>
        </div>
      </form>
      <div style="display:flex;gap:6px">
        <a th:href="@{/scenarios}" class="btn btn-sm" th:classappend="${statusFilter == null} ? 'btn-primary' : 'btn-ghost'">All</a>
        <a th:href="@{/scenarios(status='DRAFT')}"    class="btn btn-sm" th:classappend="${statusFilter == 'DRAFT'}    ? 'btn-warn'    : 'btn-ghost'">Draft</a>
        <a th:href="@{/scenarios(status='ACTIVE')}"   class="btn btn-sm" th:classappend="${statusFilter == 'ACTIVE'}   ? 'btn-success' : 'btn-ghost'">Active</a>
        <a th:href="@{/scenarios(status='ARCHIVED')}" class="btn btn-sm" th:classappend="${statusFilter == 'ARCHIVED'} ? 'btn-ghost'   : 'btn-ghost'">Archived</a>
      </div>
    </div>
  </div>

  <!-- Empty -->
  <div th:if="${#lists.isEmpty(scenarios)}" class="glass-card empty-state" style="padding:64px 24px">
    <div class="empty-icon">🗂️</div>
    <h5>No scenarios found</h5>
    <p>Create your first decision scenario to get started.</p>
    <a th:href="@{/scenarios/create}" class="btn btn-primary mt-4"><i class="bi bi-plus-lg"></i> Create Scenario</a>
  </div>

  <!-- Grid -->
  <div class="grid-3" th:unless="${#lists.isEmpty(scenarios)}">
    <div th:each="scenario : ${scenarios}" class="glass-card glass-card-lift animate-fade-up" style="padding:0;overflow:hidden">
      <div style="padding:20px 20px 16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <span class="badge badge-cat" th:text="${scenario.category}"></span>
          <span th:class="${scenario.status.name() == 'ACTIVE'} ? 'badge badge-active' : (${scenario.status.name() == 'DRAFT'} ? 'badge badge-draft' : 'badge badge-archived')"
                th:text="${scenario.status}"></span>
        </div>
        <h3 style="font-size:15px;font-weight:700;margin-bottom:6px">
          <a th:href="@{/scenarios/{id}(id=${scenario.id})}" style="color:var(--text-primary)" th:text="${scenario.title}"></a>
        </h3>
        <p style="font-size:12.5px;color:var(--text-muted);line-height:1.5;margin-bottom:14px" th:text="${#strings.abbreviate(scenario.description, 100)}">—</p>
        <div style="display:flex;gap:12px;font-size:12px;color:var(--text-dim)">
          <span><i class="bi bi-list-check" style="color:var(--accent);margin-right:4px"></i><span th:text="${#lists.size(scenario.options)}"></span> options</span>
          <span><i class="bi bi-sliders" style="color:var(--accent-2);margin-right:4px"></i><span th:text="${#lists.size(scenario.priorities)}"></span> priorities</span>
        </div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px">
        <a th:href="@{/scenarios/{id}(id=${scenario.id})}" class="btn btn-ghost btn-sm" style="flex:1;justify-content:center">
          <i class="bi bi-eye"></i> View
        </a>
        <a th:if="${scenario.readyToSimulate}" th:href="@{/simulations/run/{id}(id=${scenario.id})}" class="btn btn-success btn-sm" style="flex:1;justify-content:center">
          <i class="bi bi-lightning-charge"></i> Simulate
        </a>
        <form th:action="@{/scenarios/{id}/clone(id=${scenario.id})}" method="post" style="flex:1">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-ghost btn-sm w-full" type="submit"><i class="bi bi-copy"></i> Clone</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
