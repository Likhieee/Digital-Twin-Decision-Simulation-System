<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 Forbidden – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="text-align:center;animation:fadeUp .4s ease">
    <div style="font-size:5rem;margin-bottom:16px">🚫</div>
    <h1 style="font-size:3rem;font-weight:800;color:var(--accent-danger);margin-bottom:8px">403</h1>
    <h2 style="font-size:1.2rem;color:var(--text-muted);margin-bottom:24px">Access Denied</h2>
    <p style="color:var(--text-dim);margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto">You don't have permission to access this page. This area is restricted to administrators only.</p>
    <a th:href="@{/dashboard}" class="btn btn-primary btn-lg"><i class="bi bi-house-door"></i> Back to Dashboard</a>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
