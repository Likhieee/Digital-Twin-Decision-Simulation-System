<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">⚡</div>
      <h1>DecisionSim</h1>
      <p>Personal Digital Twin Decision Simulator</p>
    </div>
    <div class="glass-card auth-body">
      <div th:if="${param.error}"    class="alert alert-danger"><i class="bi bi-x-circle"></i> Invalid username or password.<button class="alert-close">×</button></div>
      <div th:if="${param.logout}"   class="alert alert-success"><i class="bi bi-check-circle"></i> You have been signed out.<button class="alert-close">×</button></div>
      <div th:if="${param.registered}" class="alert alert-success"><i class="bi bi-check-circle"></i> Account created! Please sign in.<button class="alert-close">×</button></div>
      <div th:if="${errorMsg}"       class="alert alert-danger"   th:text="${errorMsg}"></div>

      <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-with-icon">
            <i class="bi bi-person input-icon"></i>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-with-icon">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required/>
          </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-primary btn-full btn-lg mt-4">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a th:href="@{/auth/register}">Create one</a>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
