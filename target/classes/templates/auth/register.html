<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – DecisionSim</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">⚡</div>
      <h1>Create Account</h1>
      <p>Join DecisionSim today</p>
    </div>
    <div class="glass-card auth-body">
      <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"><button class="alert-close">×</button></div>
      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"><button class="alert-close">×</button></div>

      <form th:action="@{/auth/register}" method="post">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-with-icon">
            <i class="bi bi-person input-icon"></i>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" minlength="3" maxlength="50" required autofocus/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-with-icon">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" name="email" class="form-control" placeholder="Your email address" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-with-icon">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" name="password" class="form-control" placeholder="Min 6 characters" minlength="6" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-with-icon">
            <i class="bi bi-shield-lock input-icon"></i>
            <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat your password" minlength="6" required/>
          </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-primary btn-full btn-lg mt-4">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Already have an account? <a th:href="@{/auth/login}">Sign in</a>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
